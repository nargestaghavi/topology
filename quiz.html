<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کوییز فضای متریک</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Estedad:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Vazirmatn", "Estedad", Tahoma, sans-serif;
            background-color: rgba(48, 59, 94, 0.436);
            color: #E2F5EA;
            margin: 0;
        }

        .quiz-container, .result-container {
            max-width: 900px;
            background-color: rgba(28, 36, 58, 0.75);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #E2F5EA;
            margin-bottom: 10px;
        }

        #progress {
            font-size: 18px;
            color: #92A0B3;
            margin-bottom: 30px;
        }

        #question {
            font-size: 18px;
            margin-bottom: 30px;
            color: #E2F5EA;
            line-height: 1.6;
            font-weight: 600;
            height: 3.2em;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options {
            margin: 30px 0;
        }

        .option {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.18);
            color: #E2F5EA;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: right;
            font-size: 18px;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .option.selected {
            border-color: #0082be;
            background: rgba(0, 130, 190, 0.25);
        }

        .option.correct {
            background: rgba(60, 190, 140, 0.22);
            border-color: rgba(60, 190, 140, 0.7);
            color: #7be3b8;
        }

        .option.incorrect {
            background: rgba(210, 40, 120, 0.22);
            border-color: rgba(210, 40, 120, 0.7);
            color: #f28ab5;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            font-family: inherit;
            font-weight: bold;
        }

        /* ردیف دکمه‌ها: ارتفاع ثابتی رزرو می‌شود چون همیشه یک دکمه
           (ارسال یا بعدی) نمایش داده می‌شود، پس این بخش هرگز خالی نیست. */
        .btn-row {
            min-height: 56px;
            display: grid;
            place-items: center;
        }

        #submit-btn, #next-btn {
            grid-column: 1;
            grid-row: 1;
        }

        #submit-btn {
            background: #0082beb4;
            color: white;
        }

        #submit-btn:disabled {
            background: rgba(146, 160, 179, 0.35);
            color: #92A0B3;
            cursor: not-allowed;
        }

        #submit-btn:hover:not(:disabled) {
            background: #0082be;
        }

        #next-btn, #restart-btn {
            background: rgba(60, 190, 140, 0.6);
            color: white;
        }

        #next-btn:hover, #restart-btn:hover {
            background: rgba(60, 190, 140, 0.85);
        }

        #submit-btn.is-hidden, #next-btn.is-hidden {
            visibility: hidden;
            pointer-events: none;
        }

        /* ارتفاع فیدبک همیشه دقیقاً ثابته (height نه min-height)، با
           اسکرول داخلی برای متن‌های بلندتر. این‌طوری، چه توضیحی نمایش
           داده بشه چه نه، و چه کوتاه باشه چه بلند، ارتفاع کل صفحه از
           اول تا آخر کوییز عوض نمی‌شه. */
        .feedback {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.6;
            height: 7em;
            overflow-y: auto;
            color: #E2F5EA;
        }

        .result-container h2 {
            color: #7be3b8;
        }

        /* ارتفاع result-container با جاوااسکریپت (درست قبل از پنهان شدن
           quiz-container) برابر با آخرین ارتفاع quiz-container تنظیم
           می‌شود؛ به همین دلیل با flex محتوا وسط‌چین می‌شود تا در آن
           فضای ثابت به‌شکل طبیعی قرار بگیرد. */
        .result-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* اندازه‌های کوچک‌تر برای موبایل: دکمه‌ها (ارسال جواب، سوال بعدی،
           شروع دوباره) و گزینه‌های سوال، هم از نظر پدینگ و هم فونت. */
        @media (max-width: 480px) {
            .quiz-container, .result-container {
                padding: 18px;
            }

            .option {
                padding: 10px 12px;
                font-size: 14px;
                margin: 7px 0;
            }

            button {
                padding: 9px 18px;
                font-size: 14px;
                margin: 6px;
            }

            .btn-row {
                min-height: 42px;
            }

            #question {
                font-size: 16px;
                height: 4.2em;
            }

            .feedback {
                font-size: 15px;
                height: 8em;
            }
        }

    </style>
</head>
<body>
    <div class="quiz-container">
        
        <div id="progress">سوال <span id="current">1</span> از <span id="total">10</span></div>
        
        <div id="question"></div>
        
        <div id="options" class="options"></div>
        
        <div class="btn-row">
            <button id="submit-btn" disabled>ارسال جواب</button>
            <button id="next-btn" class="is-hidden">سوال بعدی</button>
        </div>
        
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="result-container" class="result-container" style="display:none;">
        <h2>کوییز تموم شد!</h2>
        <p>امتیاز شما: <strong><span id="final-score"></span></strong> از ۱۰</p>
        <button id="restart-btn">شروع دوباره</button>
    </div>

    <script>
        const questions = [
    {
        question: "کدام مورد جزو شروط تعریف متریک نیست؟",
        options: [
            "d(x,y) ≥ ۰",
            "d(x,y) = d(y,x)",
            "d(x,z) ≤ d(x,y) + d(y,z)",
            "d(x,y) = x + y"
        ],
        answer: 3,
        explanation: "تابع فاصله باید نامنفی، متقارن و دارای نامساوی مثلثی باشد؛ d(x,y)=x+y این شرایط را ندارد."
    },
    {
        question: "اگر d(x,y)=۰ باشد، در یک فضای متریک چه نتیجه‌ای می‌گیریم؟",
        options: [
            "x ≠ y",
            "x = y",
            "x < y",
            "نمی‌توان نتیجه گرفت"
        ],
        answer: 1,
        explanation: "در متریک، فاصله صفر فقط زمانی است که دو نقطه برابر باشند."
    },
    {
        question: "کدام متریک‌ها در ℝⁿ توپولوژی یکسانی ایجاد می‌کنند ولی شکل توپ‌های متفاوتی دارند؟",
        options: [
            "فقط متریک اقلیدسی",
            "فقط متریک منهتن",
            "فقط متریک ماکسیمم",
            "همه موارد بالا"
        ],
        answer: 3,
        explanation: "تمام متریک‌های ناشی از نرم در ℝⁿ توپولوژی یکسان دارند."
    },
    {
        question: "متریک گسسته روی مجموعه X چگونه تعریف می‌شود؟",
        options: [
            "d(x,y)=|x-y|",
            "d(x,y)=۰ برای همه نقاط",
            "d(x,y)=۱ اگر x≠y و ۰ اگر x=y",
            "d(x,y)=x+y"
        ],
        answer: 2,
        explanation: "در متریک گسسته، فاصله بین هر دو نقطه متمایز برابر ۱ است."
    },
    {
        question: "در ℝ² با متریک اقلیدسی، شکل توپ واحد چیست؟",
        options: [
            "مربع",
            "لوزی",
            "دایره",
            "مثلث"
        ],
        answer: 2,
        explanation: "در متریک اقلیدسی، توپ واحد یک دایره است."
    },
    {
        question: "کدام گزینه بیانگر نامساوی مثلثی است؟",
        options: [
            "d(x,y)=d(y,x)",
            "d(x,y) ≥ ۰",
            "d(x,z) ≤ d(x,y) + d(y,z)",
            "d(x,x)=۰"
        ],
        answer: 2,
        explanation: "نامساوی مثلثی یکی از شروط اصلی متریک است."
    },
    {
        question: "در ℝ²، متریک منهتن چه شکلی از توپ واحد ایجاد می‌کند؟",
        options: [
            "دایره",
            "مربع",
            "لوزی",
            "بیضی"
        ],
        answer: 2,
        explanation: "در متریک منهتن، توپ‌ها به شکل لوزی هستند."
    },
    {
        question: "خاصیت d(x,y)=d(y,x) چه نام دارد؟",
        options: [
            "نامنفی بودن",
            "تشخیص‌پذیری",
            "تقارن",
            "کامل بودن"
        ],
        answer: 2,
        explanation: "این خاصیت را تقارن متریک می‌نامند."
    },
    {
        question: "کدام یک مثال صحیحی از متریک روی ℝ است؟",
        options: [
            "d(x,y)=x+y",
            "d(x,y)=|x-y|",
            "d(x,y)=x²+y²",
            "d(x,y)=xy"
        ],
        answer: 1,
        explanation: "متریک معمول روی ℝ برابر |x−y| است."
    },
    {
    question: "نُرم ۱ (Manhattan norm) روی ℝⁿ چه متریکی را القا می‌کند؟",
    options: [
        "متریک اقلیدسی",
        "متریک منهتن",
        "متریک گسسته",
        "هیچکدام"
    ],
    answer: 1,
    explanation: "نُرم ۱ روی ℝⁿ متریک منهتن را القا می‌کند؛ یعنی فاصله دو نقطه برابر مجموع قدر مطلق اختلاف مختصاتشان است."
    }
];


        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedbackEl = document.getElementById('feedback');
        const currentEl = document.getElementById('current');
        const totalEl = document.getElementById('total');
        const quizContainerEl = document.querySelector('.quiz-container');
        const resultContainer = document.getElementById('result-container');
        const finalScoreEl = document.getElementById('final-score');

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            
            questionEl.textContent = q.question;
            currentEl.textContent = currentQuestionIndex + 1;
            totalEl.textContent = questions.length;
            
            optionsEl.innerHTML = '';
            q.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.classList.add('option');
                div.textContent = option;
                div.addEventListener('click', () => selectOption(div, index));
                optionsEl.appendChild(div);
            });
            
            submitBtn.disabled = true;
            submitBtn.classList.remove('is-hidden');
            nextBtn.classList.add('is-hidden');
            feedbackEl.textContent = '';
            selectedOption = null;
        }

        function selectOption(element, index) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedOption = index;
            submitBtn.disabled = false;
        }

        submitBtn.addEventListener('click', () => {
            if (selectedOption === null) return;
            
            const q = questions[currentQuestionIndex];
            const correct = selectedOption === q.answer;
            
            if (correct) score++;
            
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === q.answer) opt.classList.add('correct');
                if (i === selectedOption && !correct) opt.classList.add('incorrect');
            });
            
            feedbackEl.innerHTML = correct 
                ? '<span style="color:#7be3b8;">درست!</span><br>' + q.explanation
                : '<span style="color:#f28ab5;">غلط!</span><br>جواب درست: ' + q.options[q.answer] + '<br>' + q.explanation;
            
            submitBtn.classList.add('is-hidden');
            if (currentQuestionIndex < questions.length - 1) {
                nextBtn.classList.remove('is-hidden');
            } else {
                showResult();
            }
        });

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuestion();
        });

        function showResult() {
            // قبل از پنهان کردن quiz-container، ارتفاع فعلی‌اش را
            // اندازه می‌گیریم و به result-container می‌دهیم تا ارتفاع
            // کل صفحه در انتقال به نتیجه، تغییر نکند.
            const height = quizContainerEl.offsetHeight;
            resultContainer.style.minHeight = height + 'px';

            quizContainerEl.style.display = 'none';
            resultContainer.style.display = 'flex';
            finalScoreEl.textContent = score + '/' + questions.length;
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            quizContainerEl.style.display = 'block';
            resultContainer.style.display = 'none';
            loadQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
