<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ابزار تعاملی فاصله در صفحه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Estedad:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      direction: rtl;
      font-family: "Vazirmatn", "Estedad", Tahoma, sans-serif;
      background-color: rgba(48, 59, 94, 0.436);
      overflow: hidden;
      height: 100%;
    }
    #font-preload {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      font-family: "Vazirmatn", "Estedad";
    }
  </style>
</head>
<body>
  <script>
    let points = [];
    const PIXELS_PER_METER = 100;
    const CIRCLE_RADIUS = 12;
    const labels = ['x', 'y', 'z'];
    const CALIBRATION_THRESHOLD = 40;
 
    const TOP_UI_HEIGHT = 70;
    const BOTTOM_UI_HEIGHT = 200;
 
    let stage = 0;
    let fontsReady = false;
 
    const FONT_SIZE = 20;
 
    // رنگ‌های اصلی (روشن، مناسب برای پس‌زمینه‌ی روشن)
    const C = {
      blue:  [0, 130, 190],
      pink:  [210, 40, 120],
      green: [30, 150, 110],
      text1: [35, 40, 50],
      text2: [95, 100, 110],
    };
 
    const isMobile = () => window.innerWidth <= 767;
 
    function setup() {
      createCanvas(windowWidth, windowHeight);
      textAlign(CENTER, CENTER);
 
      if (document.fonts && document.fonts.ready) {
        Promise.all([
          document.fonts.load('600 20px Vazirmatn'),
          document.fonts.load('600 20px Estedad')
        ]).then(() => { fontsReady = true; });
        document.fonts.ready.then(() => { fontsReady = true; });
      } else {
        fontsReady = true;
      }
    }
 
    function bodyFont(bold) {
      textFont(fontsReady ? 'Vazirmatn' : 'Tahoma');
      textStyle(bold ? BOLD : NORMAL);
    }
 
    function draw() {
      clear(); // پس‌زمینه‌ی صفحه از طریق CSS (#ffffff88) دیده می‌شود
 
      drawGrid();
 
      // ----- نقاط -----
      for (let i = 0; i < points.length; i++) {
        let p = points[i];
        let col = i === 0 ? C.pink : i === 1 ? C.blue : C.green;
 
        noFill();
        stroke(col[0], col[1], col[2]);
        strokeWeight(3);
        ellipse(p.x, p.y, CIRCLE_RADIUS * 2);
 
        noStroke();
        fill(col[0], col[1], col[2], 70);
        ellipse(p.x, p.y, CIRCLE_RADIUS * 2 - 6);
        fill(255);
        ellipse(p.x, p.y, 6, 6);
 
        fill(col[0], col[1], col[2]);
        bodyFont(true);
        textSize(FONT_SIZE);
        text(labels[i], p.x, p.y - CIRCLE_RADIUS - 18);
      }
 
      // ----- راهنمای بالا -----
      fill(C.text1[0], C.text1[1], C.text1[2]);
      bodyFont(true);
      textSize(FONT_SIZE);
 
      let hint = '';
      if (stage === 0) hint = 'نقطه x را انتخاب کنید';
      else if (stage === 1) hint = 'دوباره روی نقطه x کلیک کنید';
      else if (stage === 2) hint = 'نقطه y را انتخاب کنید';
      else if (stage === 3) hint = 'نقطه z را انتخاب کنید';
      else if (stage === 4) hint = 'برای شروع دوباره کلیک کنید';
 
      text(hint, width / 2, TOP_UI_HEIGHT / 2);
 
      // ----- فاصله‌ی X → Y -----
      if (points.length >= 2) {
        let pX = points[0], pY = points[1];
        stroke(C.blue[0], C.blue[1], C.blue[2]);
        strokeWeight(3);
        line(pX.x, pX.y, pY.x, pY.y);
 
        let distXY = dist(pX.x, pX.y, pY.x, pY.y) / PIXELS_PER_METER;
        let midX = (pX.x + pY.x) / 2;
        let midY = (pX.y + pY.y) / 2;
        drawLabel(midX, midY - 16, `${distXY.toFixed(2)} متر`, C.blue);
      }
 
      // ----- فاصله‌های Y→Z و X→Z -----
      if (points.length === 3) {
        let pY = points[1], pZ = points[2], pX = points[0];
 
        stroke(C.green[0], C.green[1], C.green[2]);
        strokeWeight(2.5);
        line(pY.x, pY.y, pZ.x, pZ.y);
        let distYZ = dist(pY.x, pY.y, pZ.x, pZ.y) / PIXELS_PER_METER;
        drawLabel((pY.x + pZ.x) / 2, (pY.y + pZ.y) / 2 - 16, `${distYZ.toFixed(2)} متر`, C.green);
 
        stroke(C.pink[0], C.pink[1], C.pink[2]);
        strokeWeight(2.5);
        line(pX.x, pX.y, pZ.x, pZ.y);
        let distXZ = dist(pX.x, pX.y, pZ.x, pZ.y) / PIXELS_PER_METER;
        drawLabel((pX.x + pZ.x) / 2, (pX.y + pZ.y) / 2 - 16, `${distXZ.toFixed(2)} متر`, C.pink);
      }
 
      // ----- متن‌های پایین -----
      if (points.length >= 1) {
        let baseY = height - BOTTOM_UI_HEIGHT + 30;
        let lineHeight = 30;
        textAlign(CENTER, TOP);
 
        if (stage === 2) {
          fill(C.pink[0], C.pink[1], C.pink[2]);
          bodyFont(true);
          textSize(FONT_SIZE);
          text(`فاصله (x تا x): 0`, width / 2, baseY);
 
          bodyFont(false);
          fill(C.text2[0], C.text2[1], C.text2[2]);
          textSize(FONT_SIZE);
          text("اگر شیء در نقطه‌ی x باشد، متر باید فاصله‌ی شیء", width / 2, baseY + lineHeight);
          text("تا خودش را برابر صفر نشان دهد. همچنین مطلوب است", width / 2, baseY + 2 * lineHeight);
          text("اگر متر به گونه‌ای باشد که وقتی فاصله‌ی شی تا نقطه‌ای", width / 2, baseY + 3 * lineHeight);
          text("دیگر مانند y را صفر اعلام کرد، بتوانیم بگوییم شیء در نقطه‌ی y است.", width / 2, baseY + 4 * lineHeight);
        }
 
        if (points.length === 2) {
          let d = dist(points[0].x, points[0].y, points[1].x, points[1].y) / PIXELS_PER_METER;
 
          fill(C.blue[0], C.blue[1], C.blue[2]);
          bodyFont(true);
          textSize(FONT_SIZE);
          text(`فاصله (x تا y): ${d.toFixed(2)} متر`, width / 2, baseY);
 
          bodyFont(false);
          fill(C.text2[0], C.text2[1], C.text2[2]);
          textSize(FONT_SIZE);
          text("تقارن: d(x,y) = d(y,x)", width / 2, baseY + lineHeight);
          text("یعنی فاصله‌ی x تا y برابر است با فاصله‌ی y تا x", width / 2, baseY + 2 * lineHeight);
 
        } else if (points.length === 3) {
          let dxy = dist(points[0].x, points[0].y, points[1].x, points[1].y) / PIXELS_PER_METER;
 
          fill(C.blue[0], C.blue[1], C.blue[2]);
          bodyFont(true);
          textSize(FONT_SIZE);
          text(`فاصله (x تا y): ${dxy.toFixed(2)} متر`, width / 2, baseY);
 
          bodyFont(false);
          fill(C.text2[0], C.text2[1], C.text2[2]);
          textSize(FONT_SIZE);
          text("نامساوی مثلث: d(x,y) ≤ d(x,z) + d(z,y)", width / 2, baseY + lineHeight);
          text("کوتاه‌ترین مسیر همیشه خط مستقیم است", width / 2, baseY + 2 * lineHeight);
        }
      }
    }
 
    function drawGrid() {
      stroke(0, 0, 0, 12);
      strokeWeight(1);
      let step = 60;
      for (let gx = 0; gx < width; gx += step) {
        line(gx, TOP_UI_HEIGHT, gx, height - BOTTOM_UI_HEIGHT);
      }
      for (let gy = TOP_UI_HEIGHT; gy < height - BOTTOM_UI_HEIGHT; gy += step) {
        line(0, gy, width, gy);
      }
    }
 
    function drawLabel(cx, cy, label, colorArr) {
      noStroke();
      fill(colorArr[0], colorArr[1], colorArr[2]);
      bodyFont(true);
      textAlign(CENTER, CENTER);
      textSize(FONT_SIZE);
      text(label, cx, cy);
    }
 
    function mousePressed() {
      if (mouseY < TOP_UI_HEIGHT || mouseY > height - BOTTOM_UI_HEIGHT) {
        return;
      }
 
      if (stage === 0) {
        points[0] = { x: mouseX, y: mouseY };
        stage = 1;
      } else if (stage === 1) {
        let d = dist(mouseX, mouseY, points[0].x, points[0].y);
        if (d <= CALIBRATION_THRESHOLD) {
          stage = 2;
        }
      } else if (stage === 2) {
        points[1] = { x: mouseX, y: mouseY };
        stage = 3;
      } else if (stage === 3) {
        points[2] = { x: mouseX, y: mouseY };
        stage = 4;
      } else if (stage === 4) {
        points = [];
        stage = 0;
      }
    }
 
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
