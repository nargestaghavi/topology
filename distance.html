<!DOCTYPE html>
<html lang="fa">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ابزار تعاملی فاصله در صفحه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Estedad:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    // تنظیمات MathJax پیش از بارگذاری کتابخانه
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      options: {
        // فرمول‌ها LTR باقی می‌مانند حتی داخل ظرف RTL
        renderActions: { addMenu: [] }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    html,
    body {
      margin: 0;
      direction: rtl;
      font-family: "Vazirmatn", "Estedad", Tahoma, sans-serif;
      background-color: rgba(48, 59, 94, 0.436);
      overflow: hidden;
      height: 100%;
    }

    #info-panel {
      position: fixed;
      z-index: 5;
      line-height: 1.55;
      font-size: 18px;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #info-panel p {
      margin: 0 0 10px 0;
    }

    #info-panel .formula {
      margin: 4px 0 10px 0;
      direction: ltr;
      /* فرمول‌های ریاضی همیشه چپ‌به‌راست نمایش داده می‌شوند */
      text-align: inherit;
    }

    #info-panel .bold {
      font-weight: 700;
    }

    #info-panel .c-pink { color: rgb(210, 40, 120); }
    #info-panel .c-blue { color: rgb(0, 130, 190); }
    #info-panel .c-green { color: rgb(30, 150, 110); }
    #info-panel .c-text2 { color: rgb(226, 245, 234); }

    /* برچسب‌های زیر به‌صورت HTML رسم می‌شوند نه canvas، چون canvas الگوریتم
       دوجهته‌ی یونیکد (bidi) را روی متن‌های ترکیبی فارسی/لاتین اجرا نمی‌کند
       و باعث به‌هم‌ریختن ترتیب حروف می‌شود. مرورگر برای متن HTML این کار را
       به‌درستی انجام می‌دهد. */
    #hint-label,
    .dist-label {
      position: fixed;
      z-index: 5;
      font-weight: 700;
      font-size: 20px;
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, -50%);
      unicode-bidi: plaintext;
    }

    #hint-label {
      color: rgb(146, 160, 179);
    }
  </style>
</head>

<body>
  <div id="hint-label"></div>
  <div id="dist-labels"></div>
  <div id="info-panel"></div>

  <script>
    let points = [];
    const PIXELS_PER_METER = 100;
    const CIRCLE_RADIUS = 12;
    const labels = ['x', 'y', 'z'];
    const CALIBRATION_THRESHOLD = 40;

    const TOP_UI_HEIGHT = 70;
    const BOTTOM_UI_HEIGHT = 250;   // فقط موبایل: نوار پایین برای متن
    const MOBILE_BREAKPOINT = 480;  // زیر این عرض، حالت موبایل (نوار پایین) فعال می‌شود

    let stage = 0;
    let fontsReady = false;

    const FONT_SIZE = 20;

    const C = {
      blue: [0, 130, 190],
      pink: [210, 40, 120],
      green: [30, 150, 110],
      text1: [146, 160, 179],
      text2: [226, 245, 234],
    };

    // این کار همیشه بر اساس عرض واقعی کانواس (که ممکن است داخل یک iframe کوچک باشد)
    // انجام می‌شود، نه window.innerWidth، چون در iframeهای باریک آن مقدار می‌تواند
    // با اندازه‌ی واقعی نمایش داده‌شده فرق داشته باشد.
    const isMobile = () => width <= MOBILE_BREAKPOINT;

    // عرض ستون چپ متناسب با عرض واقعی صفحه/آیفریم تنظیم می‌شود
    // تا در عرض‌های کوچک، ستون بیش از حد بزرگ نشود یا فضای رسم را از بین نبرد.
    function leftUiWidth() {
      return constrain(width * 0.36, 140, 340);
    }

    // محدوده‌ی ناحیه‌ی رسم نقاط (بسته به دسکتاپ/موبایل تغییر می‌کند)
    function drawArea() {
      if (isMobile()) {
        return {
          left: 0,
          right: width,
          top: TOP_UI_HEIGHT,
          bottom: max(height - BOTTOM_UI_HEIGHT, TOP_UI_HEIGHT + 40)
        };
      } else {
        let leftW = leftUiWidth();
        return {
          left: leftW,
          right: width,
          top: TOP_UI_HEIGHT,
          bottom: height
        };
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textAlign(CENTER, CENTER);

      if (document.fonts && document.fonts.ready) {
        Promise.all([
          document.fonts.load('600 20px Vazirmatn'),
          document.fonts.load('600 20px Estedad')
        ]).then(() => { fontsReady = true; });
        document.fonts.ready.then(() => { fontsReady = true; });
      } else {
        fontsReady = true;
      }

      layoutInfoPanel();
      updateInfoPanel();
      updateHintLabel();
      updateDistLabels();
    }

    function bodyFont(bold) {
      textFont(fontsReady ? 'Vazirmatn' : 'Tahoma');
      textStyle(bold ? BOLD : NORMAL);
    }

    function draw() {
      clear();
      drawGrid();

      // نقاط
      for (let i = 0; i < points.length; i++) {
        let p = points[i];
        let col = i === 0 ? C.pink : i === 1 ? C.blue : C.green;

        noFill();
        stroke(col[0], col[1], col[2]);
        strokeWeight(3);
        ellipse(p.x, p.y, CIRCLE_RADIUS * 2);

        noStroke();
        fill(col[0], col[1], col[2], 70);
        ellipse(p.x, p.y, CIRCLE_RADIUS * 2 - 6);
        fill(255);
        ellipse(p.x, p.y, 6, 6);

        fill(col[0], col[1], col[2]);
        bodyFont(true);
        textSize(FONT_SIZE);
        text(labels[i], p.x, p.y - CIRCLE_RADIUS - 18);
      }

      // فاصله X→Y (فقط خط؛ برچسب متنی آن به‌صورت HTML رسم می‌شود)
      if (points.length >= 2) {
        let pX = points[0], pY = points[1];
        stroke(C.blue[0], C.blue[1], C.blue[2]);
        strokeWeight(3);
        line(pX.x, pX.y, pY.x, pY.y);
      }

      // فاصله‌های Y→Z و X→Z (فقط خط؛ برچسب متنی آن‌ها به‌صورت HTML رسم می‌شود)
      if (points.length === 3) {
        let pY = points[1], pZ = points[2], pX = points[0];

        stroke(C.green[0], C.green[1], C.green[2]);
        strokeWeight(2.5);
        line(pY.x, pY.y, pZ.x, pZ.y);

        stroke(C.pink[0], C.pink[1], C.pink[2]);
        strokeWeight(2.5);
        line(pX.x, pX.y, pZ.x, pZ.y);
      }
    }

    function drawGrid() {
      let area = drawArea();
      stroke(0, 0, 0, 12);
      strokeWeight(1);
      let step = 60;
      for (let gx = area.left; gx < area.right; gx += step) {
        line(gx, area.top, gx, area.bottom);
      }
      for (let gy = area.top; gy < area.bottom; gy += step) {
        line(area.left, gy, area.right, gy);
      }
    }

    // ---- برچسب راهنمای بالا و برچسب‌های فاصله، به‌صورت HTML ----
    // (این متن‌ها ترکیبی از حروف فارسی و لاتین/اعداد هستند؛ روی canvas این
    // ترکیب گاهی به‌هم می‌ریزد، اما در HTML مرورگر ترتیب را درست نمایش می‌دهد)

    function updateHintLabel() {
      const el = document.getElementById('hint-label');
      let hint = '';
      if (stage === 0) hint = 'نقطه x را انتخاب کنید';
      else if (stage === 1) hint = 'دوباره روی نقطه x کلیک کنید';
      else if (stage === 2) hint = 'نقطه y را انتخاب کنید';
      else if (stage === 3) hint = 'نقطه z را انتخاب کنید';
      else if (stage === 4) hint = 'برای شروع دوباره کلیک کنید';
      el.textContent = hint;
      positionHintLabel();
    }

    function positionHintLabel() {
      const el = document.getElementById('hint-label');
      let area = drawArea();
      el.style.left = ((area.left + area.right) / 2) + 'px';
      el.style.top = (TOP_UI_HEIGHT / 2) + 'px';
    }

    function addDistLabel(container, x, y, txt, colorArr) {
      const div = document.createElement('div');
      div.className = 'dist-label';
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.style.color = `rgb(${colorArr[0]}, ${colorArr[1]}, ${colorArr[2]})`;
      div.textContent = txt;
      container.appendChild(div);
    }

    function updateDistLabels() {
      const container = document.getElementById('dist-labels');
      container.innerHTML = '';

      if (points.length >= 2) {
        let pX = points[0], pY = points[1];
        let distXY = dist(pX.x, pX.y, pY.x, pY.y) / PIXELS_PER_METER;
        addDistLabel(container, (pX.x + pY.x) / 2, (pX.y + pY.y) / 2 - 16, `${distXY.toFixed(2)} متر`, C.blue);
      }

      if (points.length === 3) {
        let pY = points[1], pZ = points[2], pX = points[0];

        let distYZ = dist(pY.x, pY.y, pZ.x, pZ.y) / PIXELS_PER_METER;
        addDistLabel(container, (pY.x + pZ.x) / 2, (pY.y + pZ.y) / 2 - 16, `${distYZ.toFixed(2)} متر`, C.green);

        let distXZ = dist(pX.x, pX.y, pZ.x, pZ.y) / PIXELS_PER_METER;
        addDistLabel(container, (pX.x + pZ.x) / 2, (pX.y + pZ.y) / 2 - 16, `${distXZ.toFixed(2)} متر`, C.pink);
      }
    }

    // ---- پنل اطلاعات به‌صورت HTML (برای رندر واقعی فرمول‌ها با MathJax) ----

    function layoutInfoPanel() {
      const panel = document.getElementById('info-panel');
      if (isMobile()) {
        const maxWidth = width * 0.85;
        panel.style.left = ((width - maxWidth) / 2) + 'px';
        panel.style.right = 'auto';
        panel.style.top = (height - BOTTOM_UI_HEIGHT) + 'px';
        panel.style.width = maxWidth + 'px';
        panel.style.textAlign = 'center';
      } else {
        const leftW = leftUiWidth();
        const maxWidth = leftW - 40;
        panel.style.left = '20px';
        panel.style.right = 'auto';
        panel.style.top = TOP_UI_HEIGHT + 'px';
        panel.style.width = maxWidth + 'px';
        panel.style.textAlign = 'right';
      }
    }

    let lastPanelKey = '';

    function updateInfoPanel() {
      const panel = document.getElementById('info-panel');

      if (points.length < 1) {
        panel.innerHTML = '';
        panel.style.opacity = '0';
        lastPanelKey = '';
        return;
      }
      panel.style.opacity = '1';

      let html = '';
      let key = '';

      if (stage === 2 && points.length === 1) {
        key = 'stage2';
        html += `<p class="bold c-pink">فاصله (x تا x): 0</p>`;
        html += `<p class="c-text2">اگر شیء در نقطه‌ی x باشد، متر باید فاصله‌ی شیء تا خودش را برابر صفر نشان دهد.</p>`;
        html += `<p class="c-text2">همچنین مطلوب است اگر متر به گونه‌ای باشد که وقتی فاصله‌ی شی تا نقطه‌ای دیگر مانند y را صفر اعلام کرد، بتوانیم بگوییم شیء در نقطه‌ی y است.</p>`;
      } else if (points.length === 2) {
        let d = dist(points[0].x, points[0].y, points[1].x, points[1].y) / PIXELS_PER_METER;
        key = 'p2-' + d.toFixed(2);
        html += `<p class="bold c-blue">فاصله (x تا y): ${d.toFixed(2)} متر</p>`;
        html += `<p class="c-text2">تقارن:</p>`;
        html += `<p class="formula c-text2">\\(d(x,y) = d(y,x)\\)</p>`;
        html += `<p class="c-text2">یعنی فاصله‌ی x تا y برابر است با فاصله‌ی y تا x</p>`;
      } else if (points.length === 3) {
        let dxy = dist(points[0].x, points[0].y, points[1].x, points[1].y) / PIXELS_PER_METER;
        key = 'p3-' + dxy.toFixed(2);
        html += `<p class="bold c-blue">فاصله (x تا y): ${dxy.toFixed(2)} متر</p>`;
        html += `<p class="c-text2">نامساوی مثلث:</p>`;
        html += `<p class="formula c-text2">\\(d(x,y) \\leq d(x,z) + d(z,y)\\)</p>`;
        html += `<p class="c-text2">کوتاه‌ترین مسیر همیشه خط مستقیم است</p>`;
      }

      if (key === lastPanelKey) return; // از تایپ‌ست مجدد بی‌مورد جلوگیری می‌کند
      lastPanelKey = key;

      panel.innerHTML = html;

      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([panel]).catch(() => {});
      }
    }

    function mousePressed() {
      let area = drawArea();
      if (mouseX < area.left || mouseX > area.right || mouseY < area.top || mouseY > area.bottom) {
        return;
      }

      if (stage === 0) {
        points[0] = { x: mouseX, y: mouseY };
        stage = 1;
      } else if (stage === 1) {
        let d = dist(mouseX, mouseY, points[0].x, points[0].y);
        if (d <= CALIBRATION_THRESHOLD) {
          stage = 2;
        }
      } else if (stage === 2) {
        points[1] = { x: mouseX, y: mouseY };
        stage = 3;
      } else if (stage === 3) {
        points[2] = { x: mouseX, y: mouseY };
        stage = 4;
      } else if (stage === 4) {
        points = [];
        stage = 0;
      }

      updateInfoPanel();
      updateHintLabel();
      updateDistLabels();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      layoutInfoPanel();
      positionHintLabel();
    }
  </script>
</body>

</html>
