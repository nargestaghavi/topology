<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>چک کردن متریک</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Estedad:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.2/math.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
    body {
      font-family: "Vazirmatn", "Estedad", Tahoma, sans-serif;
      direction: rtl;
      background-color: rgba(48, 59, 94, 0.436);
      color: #E2F5EA;
      margin: 0;
    }
    h1 { color: #E2F5EA; text-align: center; }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background-color: rgba(28, 36, 58, 0.75);
      border-radius: 10px;
      padding: 30px;
    }

    .intro {
      text-align: center;
      font-size: 3vw;
      color: #92A0B3;
      margin-bottom: 20px;
    }

    /* حداقل ۱۶px تضمین می‌شود تا در موبایل هنگام فوکوس/تایپ، زوم خودکار مرورگر فعال نشود.
       قابلیت زوم دستی کاربر (pinch-zoom) دست‌نخورده باقی می‌ماند چون viewport تغییر نکرده است. */
    #display {
      width: 100%;
      height: 80px;
      font-size: clamp(16px, 3vw, 28px);
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.18);
      color: #E2F5EA;
      border-radius: 8px;
      padding: 15px;
      box-sizing: border-box;
      margin-bottom: 25px;
      direction: ltr;
      font-family: "Courier New", monospace;
      line-height: 1.5;
      cursor: text;
      overflow-wrap: break-word;
      user-select: text;
    }
    #display:empty::before { content: "(اینجا فرمول ساخته می‌شود)"; color: #92A0B3; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 25px;
    }

    /* min-width: 0 قانون پیش‌فرض گرید (min-width: auto) را می‌شکند تا دکمه‌ها
       بتوانند از عرض متن داخلی‌شان کوچیک‌تر شوند و از سلول گرید بیرون نزنند. */
    .btn {
      min-width: 0;
      padding: 18px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
      font-family: inherit;
      color: #E2F5EA;
      white-space: normal;
      line-height: 1.3;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.35); }

    /* رنگ‌ها هماهنگ با پالت ابزار اول: صورتی (X)، آبی (Y)، سبز (Z/مسیر منهتن)، زرد (چبیشف) */
    .btn-var   { background: rgba(210, 40, 120, 0.55); }
    .btn-func  { background: rgba(0, 130, 190, 0.7); }
    .btn-op    { background: rgba(60, 190, 140, 0.55); }
    .btn-extra { background: rgba(235, 170, 70, 0.55); color: #1c243a; }
    .btn-action{ background: rgba(230, 90, 170, 0.55); }

    .btn-check {
      min-width: 0;
      grid-column: span 4;
      padding: 20px;
      font-size: 20px;
      background: #0082beb4;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      white-space: normal;
      line-height: 1.3;
    }
    .btn-check:hover { background: #0082beb4; box-shadow: 0 8px 20px rgba(0,0,0,0.35); }

    /* فضای باکس نتیجه از همان ابتدا رزرو می‌شود (با border شفاف و همان padding)
       تا وقتی نتیجه ظاهر می‌شود، فقط رنگ/متن عوض شود و ارتفاع صفحه ناگهان بالا نپرد. */
    #result {
      margin-top: 25px;
      padding: 20px;
      border: 2px solid transparent;
      border-radius: 8px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
      min-height: 1.4em;
      visibility: hidden;
    }
    #result.yes,
    #result.no {
      visibility: visible;
    }
    .yes { background: rgba(60, 190, 140, 0.18); color: #7be3b8; border-color: rgba(60, 190, 140, 0.45); }
    .no  { background: rgba(210, 40, 120, 0.18); color: #f28ab5; border-color: rgba(210, 40, 120, 0.45); }

    /* موبایل: همان چیدمان ۴ ستونه حفظ می‌شود، فقط اندازه‌ی دکمه‌ها کوچیک‌تر می‌شود
       تا با min-width: 0 بالا، محتوا داخل صفحه جا شود و بیرون نزند. */
    @media (max-width: 480px) {
      .container { padding: 16px; }
      .intro { font-size: 15px; }

      .buttons { gap: 6px; }
      .btn, .btn-check {
        font-size: 15px;
        padding: 8px 4px;
      }
      #result { padding: 14px; }
#display{height: 60px;}
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <p class="intro">با دکمه‌ها فرمول فاصله d(x,y) را بسازید و چک کنید</p>

    <div id="display" contenteditable="true">|x − y|</div>

    <div class="buttons">
      <!-- متغیرها -->
      <button class="btn btn-var" onclick="insert('x')">x</button>
      <button class="btn btn-var" onclick="insert('y')">y</button>
      <button class="btn btn-var" onclick="insert('(x − y)')">(x − y)</button>
      <button class="btn btn-var" onclick="insert('|x − y|')">|x − y|</button>

      <!-- توابع اصلی -->
      <button class="btn btn-func" onclick="insert('sqrt()')">√( )</button>
      <button class="btn btn-func" onclick="insert('^')">^</button>
      <button class="btn btn-func" onclick="insert('min(,)')">min( , )</button>
      <button class="btn btn-func" onclick="insert('max(,)')">max( , )</button>

      <!-- عملگرها -->
      <button class="btn btn-op" onclick="insert(' + ')">+</button>
      <button class="btn btn-op" onclick="insert(' − ')">−</button>
      <button class="btn btn-op" onclick="insert(' × ')">×</button>
      <button class="btn btn-op" onclick="insert(' ÷ ')">÷</button>

      <!-- اضافی و مثال -->
      <button class="btn btn-extra" onclick="insert(' ( ')">(</button>
      <button class="btn btn-extra" onclick="insert(' ) ')">)</button>
      <button class="btn btn-extra" onclick="insert(' , ')">, </button>
      <button class="btn btn-extra" onclick="insert('x + y')">x + y</button>

      <!-- اقدامات -->
      <button class="btn btn-action" onclick="backspace()">← پاک کن</button>
      <button class="btn btn-action" onclick="clearDisplay()">پاک کردن همه</button>
      <button class="btn btn-action" onclick="setFormula('|x − y|')">مثال: متریک معمولی</button>
      <button class="btn btn-action" onclick="setFormula('(x − y)^2')">مثال: نیست (مربع)</button>
    </div>

    <button class="btn-check" onclick="checkMetric()">چک کن آیا متریک است؟</button>
    <div id="result"></div>
  </div>

  <script>
    const display = document.getElementById('display');
    let points = [];
    generateTestPoints();

    function generateTestPoints() {
      points = [{val: -5}, {val: -2.5}, {val: 0}, {val: 1.8}, {val: 4}, {val: 6.5}];
      points.forEach(p => p.problem = false);
    }

    function insert(text) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const textNode = document.createTextNode(text);
      range.insertNode(textNode);
      range.setStartAfter(textNode);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      display.focus();
    }

    function backspace() {
      document.execCommand('delete');
    }

    function clearDisplay() {
      display.innerHTML = '';
      display.focus();
    }

    function setFormula(f) {
      display.innerHTML = f;
      display.focus();
    }

    window.checkMetric = function() {
      let formula = display.innerText.trim() || display.textContent.trim();
      if (!formula) return alert("لطفاً فرمول را بسازید");

      generateTestPoints();
      const resultDiv = document.getElementById('result');
      resultDiv.className = 'result';
      resultDiv.innerHTML = '';

      try {
        let code = formula
          .replace(/\u2212/g, '-')
          .replace(/\s+/g, '')         // حذف فاصله‌ها
          .replace(/×/g, '*')
          .replace(/÷/g, '/')
          .replace(/\|x-y\|/g, 'abs(x-y)')
          .replace(/√/g, 'sqrt');

        const expr = math.compile(code);
        const d = (a, b) => expr.evaluate({x: a, y: b});

        let errors = [];

        // ۱. غیرمنفی بودن
        if ([...points].some(p => d(p.val, p.val + 3) < -1e-8)) errors.push("غیرمنفی نیست");

        // ۲. d(x,x) = 0
        if ([...points].some(p => Math.abs(d(p.val, p.val)) > 1e-8)) errors.push("d(x,x) ≠ ۰");

        // ۳. تقارن
        for (let i = 0; i < points.length; i++) {
          for (let j = i+1; j < points.length; j++) {
            let a = points[i].val, b = points[j].val;
            if (Math.abs(d(a,b) - d(b,a)) > 1e-8) {
              errors.push("تقارن ندارد");
              points[i].problem = points[j].problem = true;
            }
          }
        }

        // ۴. نابرابری مثلث
        for (let i = 0; i < points.length; i++)
          for (let j = 0; j < points.length; j++)
            for (let k = 0; k < points.length; k++) {
              let a = points[i].val, b = points[j].val, c = points[k].val;
              if (d(a,c) > d(a,b) + d(b,c) + 1e-8) {
                errors.push("نابرابری مثلث نقض شد");
                points[i].problem = points[k].problem = true;
              }
            }

        if (errors.length === 0) {
          resultDiv.className += ' yes';
          resultDiv.innerHTML = `✅ عالی! این تابع یک <strong>متریک</strong> است.<br>همه خاصیت‌ها برقرار هستند.`;
        } else {
          resultDiv.className += ' no';
          resultDiv.innerHTML = `❌ متریک نیست.<br>مشکلات: ${[...new Set(errors)].join('، ')}`;
        }
      } catch (e) {
        resultDiv.className += ' no';
        resultDiv.innerHTML = `❌ فرمول قابل تفسیر نیست.<br>لطفاً از دکمه‌ها استفاده کنید یا فرمول را بررسی کنید.`;
      }
    }
  </script>
</body>
</html>
