<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فضای متریک تعاملی</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Estedad:wght@400;500;600;700&display=swap" rel="stylesheet">
 
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
 
  <style>
    body {
      margin: 0;
      font-family: "Vazirmatn", "Estedad", Tahoma, sans-serif;
      background-color: rgba(48, 59, 94, 0.436);
      color: #E2F5EA;
    }
    .container {
      max-width: 1100px;
      margin: 0.5vw auto 5vw;
      background-color: rgba(28, 36, 58, 0.75);
      padding: 20px;
      border-radius: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
 
    /* دسکتاپ: ستون کنترل‌ها در یک سمت، شکل در سمت دیگر */
    @media (min-width: 460px) {
      .container {
        flex-direction: row-reverse;
        align-items: stretch;
        gap: 20px;
      }
      .sidebar {
        width: clamp(190px, 36%, 320px);
        flex-shrink: 0;
      }
      #canvasHolder {
        flex: 1;
        min-width: 0;
      }
      p, label, select, button, input, #distance {
        font-size: 12px;
      }
    }
 
    .sidebar { display: flex; flex-direction: column; justify-content: center; }
    .row { display: block; margin: 8px 0; text-align: center; }
    @media (min-width: 460px) {
      .row { text-align: right; }
    }
 
    select, input, label, button { padding: 7px; margin: 4px; font-size: 15px; font-family: inherit; }
    label { color: #92A0B3; }
    select {
      background: rgba(255, 255, 255, 0.06);
      color: #E2F5EA;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 5px;
    }
    select option { color: #111; }
    button {
      background: #0082beb4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #0082beb4; }
    p { font-size: 15px; color: #E2F5EA; margin: 0; }
    #canvasHolder { display: flex; justify-content: center; align-items: center; }
    canvas { display: block; margin: 0 auto; border-radius: 8px; max-width: 100%; }
 
    #distance {
      font-size: 20px;
      font-weight: 700;
      color: #E2F5EA;
      margin: 4px 0 10px;
      text-align: center;
    }
    @media (min-width: 460px) {
      #distance { text-align: right; font-size: 16px; }
    }
 
    .tip {
      color: #92A0B3;
      font-size: 12px !important;
      line-height: 1.8;
      margin-top: 10px !important;
    }
 
    .coords {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 8px;
      margin: 8px 0 !important;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
    }
    @media (min-width: 460px) {
      .coords { justify-content: flex-start; }
    }
    .coords .p-label { color: #E2F5EA; font-weight: 700; margin-left: 4px; }
    .coord-input {
      width: 42px;
      padding: 5px;
      margin: 2px;
      font-size: 13px;
      text-align: center;
    }
    .coords button {
      padding: 5px 10px;
      font-size: 11px;
      margin: 2px 0 2px 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <p id="distance">فاصله: ۰</p>
 
      <p class="row">با دکمه زیر بین حالت دوبعدی و سه‌بعدی جابه‌جا شوید.</p>
      <div class="row"><button id="modeButton">حالت دوبعدی</button></div>
 
      <div class="row"><label>متریک:</label>
        <select id="metricSelect">
          <option value="euclidean">اقلیدسی</option>
          <option value="manhattan">منهتن</option>
          <option value="chebyshev">چبیشف</option>
          <option value="discrete">گسسته</option>
        </select>
      </div>
 
      <div class="row"><button id="resetButton">ریست نقاط</button></div>
 
      <p class="row" style="margin-top:14px;">مختصات نقاط:</p>
      <div class="coords">
        <span class="p-label">P1</span>
        X <input type="number" id="x1" class="coord-input">
        Y <input type="number" id="y1" class="coord-input">
        Z <input type="number" id="z1" class="coord-input">
        <button onclick="updatePoint(0)">به‌روزرسانی</button>
      </div>
      <div class="coords">
        <span class="p-label">P2</span>
        X <input type="number" id="x2" class="coord-input">
        Y <input type="number" id="y2" class="coord-input">
        Z <input type="number" id="z2" class="coord-input">
        <button onclick="updatePoint(1)">به‌روزرسانی</button>
      </div>
 
      <p class="row tip" id="tipText"></p>
    </div>
 
    <div id="canvasHolder"></div>
  </div>
 
  <script>
    let points = [];
    let metric = 'euclidean';
    let is3D = true;
    const RANGE = 350;
    const BASE_W = 800, BASE_H = 600;
    let p5Instance;
    let initial3DView = true;
 
    // پالت رنگی هماهنگ با ابزار اول: X = صورتی، Y = آبی، Z = سبز
    const AXIS_X = [210, 40, 120];
    const AXIS_Y = [0, 130, 190];
    const AXIS_Z = [30, 150, 110];
 
    const POINT1_COLOR = [210, 40, 120];   // هم‌رنگ محور X
    const POINT2_COLOR = [0, 130, 190];    // هم‌رنگ محور Y
 
    const PATH_EUCLIDEAN = [230, 90, 170];
    const PATH_MANHATTAN = [60, 190, 140];
    const PATH_CHEBYSHEV = [235, 170, 70];
 
    function getCanvasSize() {
      let holder = document.getElementById('canvasHolder');
      let maxW = 700;
      let availW = holder ? holder.clientWidth : window.innerWidth;
 
      let w = Math.min(maxW, availW - 8);
      let h = w * (BASE_H / BASE_W);
 
      return { w: Math.max(w, 220), h: Math.max(h, 165) };
    }
 
    function recreateCanvas() {
      if (p5Instance) p5Instance.remove();
      p5Instance = new p5(sketch, 'canvasHolder');
      updateTip();
    }
 
    const sketch = function (p) {
      p.setup = function () {
        let size = getCanvasSize();
        let canvas = p.createCanvas(size.w, size.h, is3D ? p.WEBGL : p.P2D);
        canvas.parent('canvasHolder');
      };
 
      p.draw = function () {
        p.background(30, 38, 61);
        let s = Math.min(p.width / BASE_W, p.height / BASE_H);
 
        if (is3D) {
          if (initial3DView) {
            p.rotateX(p.radians(-35));
            p.rotateY(p.radians(45));
            p.rotateZ(p.radians(180));
          } else {
            p.orbitControl(1, 1, 0);
          }
          p.scale(s);
          p.ambientLight(100);
          p.directionalLight(255, 255, 255, 0, 0, -1);
          drawGrid3D();
          drawAxes3D();
          drawPoints3D();
          drawPath3D();
        } else {
          p.translate(p.width / 2, p.height / 2);
          p.scale(s);
          drawGrid2D();
          drawAxes2D();
          drawPoints2D();
          drawPath2D();
        }
      };
 
      p.mousePressed = function () {
        let s = Math.min(p.width / BASE_W, p.height / BASE_H);
        if (!is3D && points.length < 2) {
          let x = (p.mouseX - p.width / 2) / s;
          let y = -(p.mouseY - p.height / 2) / s;
          x = p.constrain(x, -RANGE, RANGE);
          y = p.constrain(y, -RANGE, RANGE);
          points.push({ x, y, z: 0 });
          updateInputs();
          updateDistance();
        } else if (is3D) {
          initial3DView = false;
        }
      };
 
      function drawAxes3D() {
        p.strokeWeight(4);
        p.stroke(...AXIS_X); p.line(0, 0, 0, RANGE, 0, 0);
        p.stroke(...AXIS_Z); p.line(0, 0, 0, 0, RANGE, 0);
        p.stroke(...AXIS_Y); p.line(0, 0, 0, 0, 0, RANGE);
      }
 
      function drawGrid3D() {
        p.stroke(90, 100, 130); p.strokeWeight(1);
        for (let i = -RANGE; i <= RANGE; i += 50) {
          p.line(i, 0, -RANGE, i, 0, RANGE);
          p.line(-RANGE, 0, i, RANGE, 0, i);
        }
      }
 
      function drawPoints3D() {
        p.noStroke();
        points.forEach((pt, i) => {
          p.push();
          let c = i === 0 ? POINT1_COLOR : POINT2_COLOR;
          p.fill(...c);
          p.translate(pt.x, pt.z, pt.y);
          p.sphere(14);
          p.pop();
        });
      }
 
      function drawPath3D() {
        if (points.length < 2 || metric === 'discrete') return;
        let a = points[0], b = points[1];
        let dx = Math.abs(b.x - a.x), dy = Math.abs(b.y - a.y), dz = Math.abs(b.z - a.z);
        p.strokeWeight(6);
        if (metric === 'euclidean') {
          p.stroke(...PATH_EUCLIDEAN);
          p.line(a.x, a.z, a.y, b.x, b.z, b.y);
        } else if (metric === 'manhattan') {
          p.stroke(...PATH_MANHATTAN);
          p.line(a.x, a.z, a.y, b.x, a.z, a.y);
          p.line(b.x, a.z, a.y, b.x, b.z, a.y);
          p.line(b.x, b.z, a.y, b.x, b.z, b.y);
        } else if (metric === 'chebyshev') {
          p.stroke(...PATH_CHEBYSHEV);
          let m = Math.max(dx, dy, dz);
          if (m === dx) p.line(a.x, a.z, a.y, b.x, a.z, a.y);
          else if (m === dy) p.line(a.x, a.z, a.y, a.x, b.z, a.y);
          else p.line(a.x, a.z, a.y, a.x, a.z, b.y);
        }
      }
 
      function drawAxes2D() {
        p.strokeWeight(4);
        p.stroke(...AXIS_X); p.line(-RANGE, 0, RANGE, 0);
        p.stroke(...AXIS_Y); p.line(0, -RANGE, 0, RANGE);
      }
 
      function drawGrid2D() {
        p.stroke(90, 100, 130); p.strokeWeight(1);
        for (let i = -RANGE; i <= RANGE; i += 50) {
          if (i !== 0) {
            p.line(-RANGE, i, RANGE, i);
            p.line(i, -RANGE, i, RANGE);
          }
        }
      }
 
      function drawPoints2D() {
        p.noStroke();
        points.forEach((pt, i) => {
          p.fill(...(i === 0 ? POINT1_COLOR : POINT2_COLOR));
          p.ellipse(pt.x, -pt.y, 20, 20);
        });
      }
 
      function drawPath2D() {
        if (points.length < 2 || metric === 'discrete') return;
        let a = points[0], b = points[1];
        let ax = a.x, ay = -a.y, bx = b.x, by = -b.y;
        let dx = Math.abs(b.x - a.x), dy = Math.abs(b.y - a.y);
        p.strokeWeight(6);
        if (metric === 'euclidean') {
          p.stroke(...PATH_EUCLIDEAN);
          p.line(ax, ay, bx, by);
        } else if (metric === 'manhattan') {
          p.stroke(...PATH_MANHATTAN);
          p.line(ax, ay, bx, ay);
          p.line(bx, ay, bx, by);
        } else if (metric === 'chebyshev') {
          p.stroke(...PATH_CHEBYSHEV);
          if (dx >= dy) p.line(ax, ay, bx, ay);
          else p.line(ax, ay, ax, by);
        }
      }
    };
 
    function updateDistance() {
      if (points.length < 2) { document.getElementById('distance').textContent = 'فاصله: ۰'; return; }
      let a = points[0], b = points[1];
      let dx = Math.abs(b.x - a.x), dy = Math.abs(b.y - a.y), dz = Math.abs(b.z - a.z), d = 0;
      if (metric === 'euclidean') d = Math.sqrt(dx * dx + dy * dy + dz * dz);
      else if (metric === 'manhattan') d = dx + dy + dz;
      else if (metric === 'chebyshev') d = Math.max(dx, dy, dz);
      else d = (dx === 0 && dy === 0 && dz === 0) ? 0 : 1;
      document.getElementById('distance').textContent = 'فاصله: ' + d.toFixed(2);
    }
 
    function resetPoints() {
      points = [];
      updateInputs();
      updateDistance();
      initial3DView = true;
    }
 
    function switchDimension() {
      is3D = !is3D;
      points = [];
      initial3DView = true;
      recreateCanvas();
      updateInputs();
      updateDistance();
      document.getElementById('modeButton').innerText = is3D ? 'حالت دوبعدی' : 'حالت سه‌بعدی';
    }
 
    document.getElementById('modeButton').onclick = switchDimension;
    document.getElementById('resetButton').onclick = resetPoints;
 
    document.getElementById('metricSelect').addEventListener('change', e => {
      metric = e.target.value;
      updateDistance();
    });
 
    function updatePoint(index) {
      if (points.length < index + 1) points[index] = { x: 0, y: 0, z: 0 };
      points[index].x = Number(document.getElementById('x' + (index + 1)).value) || 0;
      points[index].y = Number(document.getElementById('y' + (index + 1)).value) || 0;
      points[index].z = Number(document.getElementById('z' + (index + 1)).value) || 0;
      updateDistance();
    }
 
    function updateInputs() {
      document.getElementById('x1').value = points[0] ? points[0].x.toFixed(0) : '';
      document.getElementById('y1').value = points[0] ? points[0].y.toFixed(0) : '';
      document.getElementById('z1').value = points[0] ? points[0].z.toFixed(0) : '';
      document.getElementById('x2').value = points[1] ? points[1].x.toFixed(0) : '';
      document.getElementById('y2').value = points[1] ? points[1].y.toFixed(0) : '';
      document.getElementById('z2').value = points[1] ? points[1].z.toFixed(0) : '';
    }
 
    function updateTip() {
      let tip = document.getElementById('tipText');
      if (is3D) tip.innerHTML = 'برای مشخص کردن نقاط، فقط از ورود مختصات استفاده کنید.<br>نمودار را می‌توانید بچرخانید.';
      else tip.innerHTML = 'با کلیک روی صفحه نقاط مشخص می‌شوند.';
    }
 
    recreateCanvas();
 
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(recreateCanvas, 150);
    });
  </script>
</body>
</html>
