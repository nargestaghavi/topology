<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آموزش فضای متریک</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }

        /* کانتینر اصلی سه بعدی */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* هدر اصلی */
        header {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .header-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: bold;
            color: #e2e8f0;
            text-shadow: 0 0 20px rgba(0, 149, 255, 0.5);
            text-align: center;
            transition: transform 0.1s ease;
            padding: 0 20px;
        }

        /* بخش محتوای آموزش */
        .content-section {
            position: relative;
            min-height: 100vh;
            z-index: 3;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20vh;
        }

        .navbar {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 5vw;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 1000;
            justify-content: center;
        }

        .navbar li {
            flex: 1;
            background-color: #152f55ce;
            border-radius: 1.5vw;
        }

        .navbar li a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 20vw;
            text-decoration: none;
            color: rgb(210, 211, 206);
            font-size: 15px;
            font-weight: bold;
            padding: 10px;
            font-family: "El Messiri", sans-serif;
        }

        .navbar li a:hover,
        .navbar li a:active {
            background-color: rgb(140, 221, 170);
            color: #060120;
            border-radius: 2vw;
        }



        @media (max-width: 768px) {
            .content-section {
                padding: 60px 15px;
            }

        }

        @media (max-width: 480px) {
            .content-section {
                padding: 40px 10px;
            }

        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <header>
        <h1 class="header-title">فضای متریک</h1>
    </header>

    <div class="content-section">
        <header>
            <ul class="navbar">
                <li><a href="#1">تعریف</a></li>
                <li><a href="#2">انواع متریک‌ها</a></li>
                <li><a href="#3">چک کردن متریک</a></li>
                <li><a href="#4">کوییز</a></li>
            </ul>
        </header>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="main.js"></script>

</body>

</html>
